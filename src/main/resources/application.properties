# Server
server.port=8080

# H2 in-memory database (data resets on restart — good for demos)
spring.datasource.url=jdbc:h2:mem:firewalldb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — auto-creates tables from our entity classes
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 console available at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# JWT secret key and expiry (1 day in milliseconds)
jwt.secret=MySuperSecretKeyForFirewallAPIThatIsLongEnoughForHS256Algorithm
jwt.expiration=86400000

# App name
spring.application.name=firewall-api
